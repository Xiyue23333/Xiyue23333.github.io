<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-labelledby="title desc">
  <title id="title">Grass Block</title>
  <desc id="desc">An isometric pixel-style grass block for the Minecraft-themed homepage hero.</desc>
  <defs>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dc768"/>
      <stop offset="1" stop-color="#467e3b"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b4b35"/>
      <stop offset="1" stop-color="#4b3325"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#835b41"/>
      <stop offset="1" stop-color="#583a29"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="clipTop">
      <polygon points="180,38 308,112 180,186 52,112"/>
    </clipPath>
    <clipPath id="clipLeft">
      <polygon points="52,112 180,186 180,316 52,242"/>
    </clipPath>
    <clipPath id="clipRight">
      <polygon points="308,112 180,186 180,316 308,242"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)" shape-rendering="crispEdges">
    <polygon points="180,38 308,112 180,186 52,112" fill="url(#topFace)"/>
    <polygon points="52,112 180,186 180,316 52,242" fill="url(#leftFace)"/>
    <polygon points="308,112 180,186 180,316 308,242" fill="url(#rightFace)"/>

    <g clip-path="url(#clipTop)">
